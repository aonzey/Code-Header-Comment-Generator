<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码头注释生成器</title>
    <!-- 引入 Sortable.js 库 -->
    <script src="js/Sortable.min.js"></script>
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>📝 代码头注释生成器</h1>

    <div class="container">
        <!-- 左侧配置区 -->
        <div class="left-panel">
            <div class="form-group">
                <label>选择语言风格：</label>
                <select id="languageSelect">
                    <option value="c-style">C / C++ / Java / JS / Go / Rust (/* ... */)</option>
                    <option value="python">Python (# ...)</option>
                    <option value="html">HTML / XML</option>
                    <option value="shell">Shell / Bash (# ...)</option>
                    <option value="lua">Lua (-- ...)</option>
                </select>
            </div>

            <div class="fields-container" id="fieldsContainer">
                <!-- 动态字段将在这里生成 -->
            </div>

            <button class="btn btn-secondary" onclick="addField()">+ 添加新条目</button>
            <button class="btn btn-danger" onclick="clearCache()" style="margin-top: 10px; background-color: #e67e22;">🗑️ 清除缓存</button>
        </div>

        <!-- 右侧预览区 -->
        <div class="right-panel">
            <div class="preview-header">
                <label style="margin:0;">生成预览：</label>
                <div>
                    <button class="btn btn-primary" onclick="generateHeader()">刷新预览</button>
                    <button class="btn btn-success" onclick="copyToClipboard()">复制代码</button>
                </div>
            </div>
            <textarea id="outputArea" readonly></textarea>
        </div>
    </div>

    <!-- 引入外部JS文件 -->
    <script src="script.js"></script>
</body>
</html>
